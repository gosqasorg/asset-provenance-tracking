name: On Push Frontend

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
#  note: job currently not working
#  frontend-ui-testing:
#    runs-on: ubuntu-latest
#    steps:
#      - name: Checkout
#        uses: actions/checkout@v4.1.7
#      - name: Run frontend UI tests
#        uses: ./.github/actions/frontend-ui-testing

  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4.1.7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # tells tests to run if any files in the frontend were changed
          filters: |
            frontend:
              - 'packages/frontend/**'

  frontend-deploy:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Use Node.js 18
        uses: actions/setup-node@v4.0.2
        with:
          node-version: 18
      - name: Checkout
        uses: actions/checkout@v4.1.7
      - name: build frontend
        working-directory: packages/frontend
        run: |
          npm ci
          npx nuxi build --preset=azure
          npm run coverage
        env:
          FRONTEND_URL: https://red-stone-00f5d251e.5.azurestaticapps.net/
      - name: deploy frontend
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ./packages/frontend
        run: |
          npx @azure/static-web-apps-cli deploy .output/public/ --api-location .output/server/ --env production --deployment-token  ${{ secrets.AZURE_SWA_DEPLOYMENT_TOKEN }}
      - name: Upload build artifact
        uses: actions/upload-artifact@v4.3.3
        with:
          name: packages
          path: packages/frontend/.output/**

