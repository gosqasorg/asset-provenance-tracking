name: On Push Frontend

on:
  push:
    branches:
      - main

    # paths:
    #   - packages/frontend/**
    #   - .github/workflows/fe_on_push.yml
    #   - '!packages/backend/**'
    #   - '!.github/workflows/be_on_push.yml'
  pull_request:
    branches:
      - main

    # paths:
    #   - packages/frontend/**
    #   - .github/workflows/fe_on_push.yml
    #   - '!packages/backend/**'
    #   - '!.github/workflows/be_on_push.yml'

jobs:
#  note: job currently not working
#  frontend-ui-testing:
#    runs-on: ubuntu-latest
#    steps:
#      - name: Checkout
#        uses: actions/checkout@v4.1.7
#      - name: Run frontend UI tests
#        uses: ./.github/actions/frontend-ui-testing

# TODO: try and get github to ignore this file if no frontend files were changed
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4.1.7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # outputs true if files changed match ANY of the filters
          filters: |
            frontend:
              - 'packages/frontend/**'

  frontend-deploy:
    needs: changes
    # if should skip AND return success, rather than waiting in pending
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo ${{ needs.changes.outputs.frontend }}  # TODO: remove when done (should print false or nothing)
      - name: Use Node.js 18
        uses: actions/setup-node@v4.0.2
        with:
          node-version: 18
      - name: Checkout
        uses: actions/checkout@v4.1.7
      - name: build frontend
        working-directory: packages/frontend
        run: |
          npm ci
          npx nuxi build --preset=azure
          npm run coverage
        env:
          FRONTEND_URL: https://red-stone-00f5d251e.5.azurestaticapps.net/
      - name: deploy frontend
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ./packages/frontend
        run: |
          npx @azure/static-web-apps-cli deploy .output/public/ --api-location .output/server/ --env production --deployment-token  ${{ secrets.AZURE_SWA_DEPLOYMENT_TOKEN }}
      - name: Upload build artifact
        uses: actions/upload-artifact@v4.3.3
        with:
          name: packages
          path: packages/frontend/.output/**

